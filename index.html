<!DOCTYPE html>
<html lang="es" class="ion-palette-dark">>
  <head>
    <meta charset="utf-8" />
	<!-- Evita que el usuario haga zoom pellizcando la pantalla (comportamiento de app nativa) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<!-- Indica a iOS que es una web app capaz -->
<meta name="apple-mobile-web-app-capable" content="yes" />

<!-- Color de la barra de estado superior de iOS -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<!-- Título que aparecerá en la pantalla de inicio de iOS -->
<meta name="apple-mobile-web-app-title" content="Ministry" />

<!-- Ícono para iOS (Debes crear esta imagen y ponerla en tu carpeta public) -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Ionic App</title>
    
    <base href="/" />
    
    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <link rel="manifest" href="/manifest.json" />
    
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    
    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ionic App" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
